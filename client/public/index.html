<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- App favicons / logo -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/tracechain-mark.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/tracechain-mark.svg" />
    <!-- Social preview image -->
    <meta property="og:image" content="%PUBLIC_URL%/tracechain-mark.svg" />
    <meta name="twitter:image" content="%PUBLIC_URL%/tracechain-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#13111C" />
    <meta
      name="description"
      content="TraceChain is a modern blockchain and AI product traceability platform for trusted verification, compliance evidence, and public authenticity checks."
    />
    <meta property="og:title" content="TraceChain | Product Traceability Platform" />
    <meta property="og:description" content="Enterprise-grade blockchain traceability with AI insights, audit trails, QR verification, and modern producer workflows." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TraceChain | Product Traceability Platform" />
    <meta name="twitter:description" content="Trusted product verification and supply-chain transparency powered by blockchain and AI." />
    <!-- Removed problematic base href for correct asset loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>TraceChain | Product Traceability Platform</title>
    
    <!-- Prevent white flash on initial load -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 32%),
          linear-gradient(160deg, #f5f3ff 0%, #eef2ff 48%, #ecfeff 100%);
        transition: background 0.3s ease;
        color: #201a31;
      }
      
      /* Dark mode background */
      @media (prefers-color-scheme: dark) {
        html, body {
          background:
            radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 28rem),
            linear-gradient(160deg, #13111C 0%, #171321 46%, #0f1624 100%);
          color: #f8f7ff;
        }
      }
      
      /* Loading indicator */
      .initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
      }
      
      .spinner {
        width: 48px;
        height: 48px;
        border: 2px solid transparent;
        border-top: 2px solid #A855F7;
        box-shadow: 0 0 24px rgba(168, 85, 247, 0.25);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    
    <!-- Chunk loading error handler -->
    <script>
      // Global error handler for chunk loading failures
      window.addEventListener('error', function(event) {
        const isChunkError = event.message && (
          event.message.includes('Loading chunk') ||
          event.message.includes('ChunkLoadError') ||
          event.message.includes('Loading CSS chunk') ||
          (event.filename && event.filename.includes('.chunk.js'))
        );
        
        if (isChunkError) {
          console.log('🔄 Chunk loading error detected, reloading page...');
          console.error('Chunk loading error:', event.message, event.filename);
          
          // Store the current path to restore after reload
          sessionStorage.setItem('reloadPath', window.location.pathname + window.location.search);
          
          // Reload the page to recover from chunk loading errors
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        }
      });

      // Handle unhandled promise rejections (for dynamic imports)
      window.addEventListener('unhandledrejection', function(event) {
        const isChunkError = event.reason && (
          event.reason.name === 'ChunkLoadError' ||
          (event.reason.message && event.reason.message.includes('Loading chunk'))
        );
        
        if (isChunkError) {
          console.log('🔄 Chunk loading promise rejection detected, reloading page...');
          console.error('Chunk loading promise rejection:', event.reason);
          
          // Prevent the error from appearing in console
          event.preventDefault();
          
          // Store the current path to restore after reload
          sessionStorage.setItem('reloadPath', window.location.pathname + window.location.search);
          
          // Reload the page to recover from chunk loading errors
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        }
      });

      // Restore path after reload if needed
      window.addEventListener('load', function() {
        const reloadPath = sessionStorage.getItem('reloadPath');
        if (reloadPath && reloadPath !== window.location.pathname + window.location.search) {
          sessionStorage.removeItem('reloadPath');
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, '', reloadPath);
          }
        }
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Initial loading indicator to prevent white screen -->
    <div id="initial-loader" class="initial-loader">
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Remove initial loader when React app loads -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        // Remove loader after a short delay to ensure smooth transition
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader && document.getElementById('root').children.length > 0) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
