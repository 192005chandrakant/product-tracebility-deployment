version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: product-tracibility-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: product-traceability
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: product-tracibility-backend
    environment:
      NODE_ENV: development
      PORT: 8080
      MONGODB_URI: mongodb://admin:password@mongodb:27017/product-traceability?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      CORS_ALLOW_ALL: "true"
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    healthcheck:
      test: curl --fail http://localhost:8080/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service (optional - usually run with npm)
  # frontend:
  #   image: node:18
  #   container_name: product-tracibility-frontend
  #   working_dir: /app
  #   environment:
  #     REACT_APP_API_URL: http://backend:8080
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./client:/app
  #   command: sh -c "npm install && npm start"
  #   depends_on:
  #     - backend

volumes:
  mongodb_data:

networks:
  default:
    name: product-tracibility-network
